<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Art Quiz</title>

    <!-- NOVO: preconnect avisa o navegador para conectar nesses servidores
         antecipadamente, antes de precisar baixar as fontes de fato.
         O "crossorigin" na linha do gstatic é necessário porque arquivos
         de fonte são carregados com CORS — sem ele o preconnect seria ignorado. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- NOVO: carrega as fontes Playfair Display (serifada, usada nos títulos)
         e DM Sans (sem serifa, usada no corpo do texto) -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- START SCREEN -->
    <!-- ALTERADO: antes era um único .container centralizado na página.
         Agora a tela é split: .start-art (imagem ocupa metade esquerda)
         e .start-content (texto na metade direita), lado a lado via flex. -->
    <div class="screen active" id="start-screen">
      <!-- NOVO: painel da imagem com overlay gradiente por cima -->
      <div class="start-art">
        <img src="vangogh.jpg" alt="Van Gogh painting" />
        <div class="start-art-overlay"></div>
      </div>
      <!-- NOVO: painel do conteúdo textual -->
      <div class="start-content">
        
        <h1>Art<br/><em>Quiz</em></h1>
        <p>Vamos testar seus conhecimentos sobre quadros, esculturas e movimentos artísticos.</p>
        <button id="start-btn">Começar <span>→</span></button>
      </div>
    </div>

    <!-- QUIZ SCREEN -->
    <div class="screen" id="quiz-screen">
      <!-- NOVO: .quiz-layout é o container flex que alterna entre
           imagem-esquerda/texto-direita (padrão) e
           texto-esquerda/imagem-direita (quando a classe .flip é adicionada via JS) -->
      <div class="quiz-layout" id="quiz-layout">

        <!-- NOVO: painel da imagem. O JS troca o src a cada pergunta
             e adiciona .fade-out para animar a transição -->
        <div class="quiz-image-panel" id="quiz-image-panel">
          <img id="quiz-image" src="vangogh.jpg" alt="Obra de arte" />
          <!-- NOVO: legenda opcional que aparece sobre a imagem -->
          <div class="image-caption" id="image-caption"></div>
        </div>

        <!-- NOVO: painel do conteúdo do quiz (antes era um único div linear sem split) -->
        <div class="quiz-content-panel">
          <!-- ALTERADO: antes era .quiz-info com dois <p> separados.
               Agora é .quiz-meta com contador e badge de pontuação lado a lado -->
          <div class="quiz-meta">
            <span class="question-counter">
              <span id="current-question">1</span><em>/<span id="total-questions">7</span></em>
            </span>
            <span class="score-badge">★ <span id="score">0</span></span>
          </div>

          <h2 id="question-text">Question goes here</h2>

          <div id="answers-container" class="answers-container"></div>

          <div class="progress-bar">
            <div id="progress" class="progress"></div>
          </div>
        </div>

      </div>
    </div>

    <!-- RESULT SCREEN -->
    <!-- ALTERADO: antes era um único div centralizado.
         Agora também é split: .result-art (imagem) e .result-content (texto),
         seguindo o mesmo padrão da start screen -->
    <div id="result-screen" class="screen">
      <!-- NOVO: painel da imagem com filtro escurecido e overlay -->
      <div class="result-art">
        <img src="vangogh.jpg" alt="Van Gogh painting" />
        <div class="result-art-overlay"></div>
      </div>
      <!-- NOVO: painel do conteúdo dos resultados -->
      <div class="result-content">
        <span class="label">Fim do jogo</span>
        <h1>Resultados</h1>
        <!-- NOVO: exibe acertos e total em números grandes separados por um divisor vertical -->
        <div class="result-score-display">
          <span id="final-score">0</span>
          <div class="result-divider"></div>
          <span id="max-score">7</span>
        </div>
        <div id="result-message" class="result-message">Brilhou!</div>
        <button id="restart-btn">&#8634; Recomeçar</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
